name: Release

on:
  push:
    tags:
      - "v*.*.*" # Triggers on tags like v0.1.0, v1.2.3

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # nimbus-local/nimbus

jobs:
  release:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write # Required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run tests before release
        run: go test ./... -race -timeout 60s

      - name: Set up QEMU
        # Required for multi-arch builds (arm64 for Apple Silicon devs)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Built-in, no manual secret needed

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # v0.1.0 -> 0.1.0, 0.1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          # Build for both amd64 (CI/servers) and arm64 (Apple Silicon devs)
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/nimbus-local/nimbus:${{ github.ref_name }}
            ```

            ## docker-compose.yml

            ```yaml
            services:
              nimbus:
                image: ghcr.io/nimbus-local/nimbus:${{ github.ref_name }}
                ports:
                  - "4566:4566"
            ```

            See [README](https://github.com/nimbus-local/nimbus#readme) for full setup instructions.
